<!DOCTYPE html>
<html>
<head>
  <title>PocketBook Simulator</title>
  <link rel="stylesheet" href="simulator/css/index.css">
</head>
<body>

  <div id="sidebar">
    <div id="sidebar-inner">
      <div class="sidebar-title">Projects</div>
      <ul id="project-list">
        <li data-project="helloworld">helloworld</li>
        <li data-project="touch">touch</li>
        <li data-project="demo01">demo01</li>
        <li data-project="demo04">demo04</li>
        <li data-project="demo06">demo06</li>
        <li data-project="demo07">demo07</li>
        <li data-project="calc">calc</li>
        <li data-project="2048">2048</li>
        <li data-project="tictactoe">tictactoe</li>
        <li data-project="pbtetris">pbtetris</li>
      </ul>
    </div>
    <button id="sidebar-toggle" title="Toggle sidebar">&#9664;</button>
  </div>

  <div id="main">
<div id="launcher">
      <div class="launcher-header">Applications</div>
      <div class="launcher-grid">
        <div class="app-tile" data-project="helloworld">
          <div class="app-icon-box">H</div>
          <div class="app-name">Hello World</div>
        </div>
        <div class="app-tile" data-project="touch">
          <div class="app-icon-box">T</div>
          <div class="app-name">Touch</div>
        </div>
        <div class="app-tile" data-project="demo01">
          <div class="app-icon-box">D</div>
          <div class="app-name">Demo 01</div>
        </div>
        <div class="app-tile" data-project="demo04">
          <div class="app-icon-box">D4</div>
          <div class="app-name">Demo 04</div>
        </div>
        <div class="app-tile" data-project="demo06">
          <div class="app-icon-box">UI</div>
          <div class="app-name">Demo 06</div>
        </div>
        <div class="app-tile" data-project="demo07">
          <div class="app-icon-box">DB</div>
          <div class="app-name">Demo 07</div>
        </div>
        <div class="app-tile" data-project="calc">
          <div class="app-icon-box">#</div>
          <div class="app-name">Calc</div>
        </div>
        <div class="app-tile" data-project="2048">
          <div class="app-icon-box">2048</div>
          <div class="app-name">2048</div>
        </div>
        <div class="app-tile" data-project="tictactoe">
          <div class="app-icon-box">XO</div>
          <div class="app-name">Tic-Tac-Toe</div>
        </div>
        <div class="app-tile" data-project="pbtetris">
          <div class="app-icon-box">&#x25A6;</div>
          <div class="app-name">Tetris</div>
        </div>
      </div>
    </div>

    <canvas id="canvas"></canvas>
    <div id="status">Initializing...</div>
    <div class="controls">
      <button id="prevPage">&#9664; Prev</button>
      <button id="nextPage">Next &#9654;</button>
      <button id="home">Home</button>
      <button id="back">Back</button>
      <button id="rotate">&#x21BB; Rotate</button>
    </div>
  </div>

  <script>
    var PROJECTS = ['helloworld', 'touch', 'demo01', 'demo04', 'demo06', 'demo07', 'calc', '2048', 'tictactoe', 'pbtetris'];
    var hash = location.hash.slice(1);
    var activeProject = PROJECTS.indexOf(hash) >= 0 ? hash : null;

    // Mark active sidebar item
    document.querySelectorAll('#project-list li').forEach(function(li) {
      li.classList.toggle('active', li.dataset.project === activeProject);
      li.addEventListener('click', function() {
        location.hash = li.dataset.project;
        location.reload();
      });
    });

    // Launcher tile clicks
    document.querySelectorAll('.app-tile').forEach(function(tile) {
      tile.addEventListener('click', function() {
        location.hash = tile.dataset.project;
        location.reload();
      });
    });

    // Sidebar collapse toggle
    var sidebar = document.getElementById('sidebar');
    var toggleBtn = document.getElementById('sidebar-toggle');
    toggleBtn.addEventListener('click', function() {
      var collapsed = sidebar.classList.toggle('collapsed');
      toggleBtn.textContent = collapsed ? '\u25B6' : '\u25C4';
    });

    // Show launcher or app UI
    if (!activeProject) {
      document.getElementById('canvas').style.display = 'none';
      document.getElementById('status').style.display = 'none';
      document.querySelector('.controls').style.display = 'none';
    } else {
      document.getElementById('launcher').style.display = 'none';
    }
  </script>

  <script type="module">
    import { initApp } from './simulator/inkview-emu.mjs';
    var hash = location.hash.slice(1);
    var project = ['helloworld', 'touch', 'demo01', 'demo04', 'demo06', 'demo07', 'calc', '2048', 'tictactoe', 'pbtetris'].indexOf(hash) >= 0 ? hash : null;
    if (project) initApp(project);
  </script>

</body>
</html>
